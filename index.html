<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Logistics Route Planner</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 650px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .card {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }
        .row {
            display: flex;
            gap: 16px;
        }
        .row .form-group {
            flex: 1;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
        }
        input, select, button {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #0056b3;
            color: white;
            cursor: pointer;
            border: none;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }
        button:hover {
            background-color: #004494;
        }
        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }
        #result {
            margin-top: 24px;
            padding: 16px;
            background-color: #eef;
            border-radius: 4px;
            display: none;
        }
        .step {
            margin-bottom: 12px;
            padding-left: 16px;
            border-left: 3px solid #0056b3;
        }
        .loading {
            color: #666;
            font-style: italic;
            font-size: 14px;
        }
        .cost-highlight {
            font-size: 1.2em;
            color: #28a745;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Global Order Routing Engine</h2>
    <p class="loading" id="loadingText">Loading global databases...</p>

    <div class="row">
        <div class="form-group">
            <label for="origin">Country of Origin:</label>
            <select id="origin" onchange="fetchVendors(this.value)" disabled>
                <option value="">Select Origin...</option>
            </select>
        </div>
        <div class="form-group">
            <label for="vendor">Select Vendor:</label>
            <select id="vendor" disabled>
                <option value="">Select Origin First...</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label for="destination">Destination Country:</label>
            <select id="destination" disabled>
                <option value="">Select Destination...</option>
            </select>
        </div>
        <div class="form-group">
            <label for="productType">Product Type:</label>
            <select id="productType" disabled>
                <option value="">Select Product...</option>
            </select>
        </div>
    </div>
    
    <div class="form-group">
        <label for="weight">Order Weight:</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="weight" placeholder="Enter weight..." min="0.1" step="0.1" style="flex: 2;" required>
            <select id="unit" style="flex: 1;">
                <option value="kg">kg</option>
                <option value="lbs">lbs</option>
            </select>
        </div>
    </div>

    <button id="calcBtn" onclick="calculateRoute()" disabled>Determine Transport Route</button>

    <div id="result"></div>
</div>

<script>
    let countryData = {};

    // 1. Fetch countries and product categories on load
    async function initializeApp() {
        try {
            // Fetch Countries from REST Countries API
            const countryRes = await fetch('https://restcountries.com/v3.1/all?fields=name,region,cca2');
            const countries = await countryRes.json();
            countries.sort((a, b) => a.name.common.localeCompare(b.name.common));

            const originSelect = document.getElementById('origin');
            const destSelect = document.getElementById('destination');

            countries.forEach(country => {
                countryData[country.cca2] = { name: country.name.common, region: country.region };
                originSelect.add(new Option(country.name.common, country.cca2));
                destSelect.add(new Option(country.name.common, country.cca2));
            });

            // Fetch Product Categories from FakeStore API
            const productRes = await fetch('https://fakestoreapi.com/products/categories');
            const categories = await productRes.json();
            const productSelect = document.getElementById('productType');
            
            categories.forEach(cat => {
                // Capitalize first letter
                const catName = cat.charAt(0).toUpperCase() + cat.slice(1);
                productSelect.add(new Option(catName, cat));
            });

            // Enable inputs
            originSelect.disabled = false;
            destSelect.disabled = false;
            productSelect.disabled = false;
            document.getElementById('calcBtn').disabled = false;
            document.getElementById('loadingText').style.display = 'none';

        } catch (error) {
            document.getElementById('loadingText').innerText = "Failed to load API data. Please check your connection.";
            console.error("Error fetching initial data:", error);
        }
    }

    // 2. Simulated Vendor API based on Origin Country
    async function fetchVendors(countryCode) {
        const vendorSelect = document.getElementById('vendor');
        
        if (!countryCode) {
            vendorSelect.innerHTML = '<option value="">Select Origin First...</option>';
            vendorSelect.disabled = true;
            return;
        }

        vendorSelect.innerHTML = '<option value="">Searching regional vendors...</option>';
        vendorSelect.disabled = true;

        // Simulate a network API delay
        await new Promise(resolve => setTimeout(resolve, 800));

        const countryName = countryData[countryCode].name;
        
        // Mock data generation (In a real app, this would be a fetch() call to a vendor DB)
        const mockVendors = [
            `${countryName} Apex Manufacturing`,
            `Global Exports (${countryCode}) Ltd.`,
            `Prime ${countryName} Suppliers`,
            `${countryName} Industrial Co.`
        ];

        vendorSelect.innerHTML = '<option value="">Select Vendor...</option>';
        mockVendors.forEach(vendor => {
            vendorSelect.add(new Option(vendor, vendor));
        });
        
        vendorSelect.disabled = false;
    }

    // 3. Core routing and cost logic
    function calculateRoute() {
        const originCode = document.getElementById('origin').value;
        const destCode = document.getElementById('destination').value;
        const vendor = document.getElementById('vendor').value;
        const product = document.getElementById('productType').value;
        const weightInput = parseFloat(document.getElementById('weight').value);
        const unit = document.getElementById('unit').value;
        const resultDiv = document.getElementById('result');

        if (!originCode || !destCode || !vendor || !product) {
            alert("Please complete all dropdown selections.");
            return;
        }
        if (isNaN(weightInput) || weightInput <= 0) {
            alert("Please enter a valid weight.");
            return;
        }

        const origin = countryData[originCode];
        const dest = countryData[destCode];
        const weightKg = unit === 'lbs' ? weightInput * 0.453592 : weightInput;
        
        let transportType = "";
        let routeSteps = [];
        let estimatedCost = 0;

        // Condition A: Domestic Shipping
        if (originCode === destCode) {
            if (weightKg < 50) {
                transportType = "Domestic Parcel Courier";
                estimatedCost = 8.50 + (1.20 * weightKg);
                routeSteps = [
                    `Pickup from ${vendor} in ${origin.name}`,
                    "Transport: Local Courier Van to National Sorting Hub",
                    "Transport: Linehaul Truck Network",
                    `Final Transport: Local Delivery Van to Destination in ${dest.name}`
                ];
            } else {
                transportType = "Domestic Freight (LTL/FTL)";
                estimatedCost = 65.00 + (0.60 * weightKg);
                routeSteps = [
                    `Pickup from ${vendor} in ${origin.name}`,
                    "Transport: Regional Freight Carrier",
                    "Hub: Domestic Freight Terminal",
                    `Final Transport: Heavy Box Truck to Destination in ${dest.name}`
                ];
            }
        } 
        // Condition B: Trans-Continental / Regional
        else if (origin.region === dest.region) {
            if (weightKg < 30) {
                transportType = "Cross-Border Express Parcel";
                estimatedCost = 25.00 + (3.50 * weightKg);
                routeSteps = [
                    `Pickup from ${vendor} in ${origin.name}`,
                    "Transport: Express Courier Van",
                    "Customs: Regional Export/Import Clearance",
                    "Transport: Cross-border Trucking",
                    `Final Transport: Local Courier to destination in ${dest.name}`
                ];
            } else {
                transportType = "International Ground/Rail Freight";
                estimatedCost = 120.00 + (1.10 * weightKg);
                routeSteps = [
                    `Pickup from ${vendor} in ${origin.name}`,
                    "Transport: LTL Truck to Regional Rail/Freight Hub",
                    "Customs: Commercial Customs Processing",
                    `Transport: Cross-border Rail or Heavy Transport Trucking through ${origin.region}`,
                    `Final Transport: Freight Truck to destination in ${dest.name}`
                ];
            }
        } 
        // Condition C: Intercontinental
        else {
            if (weightKg < 2) {
                transportType = "Intercontinental Small Parcel Air";
                estimatedCost = 35.00 + (8.00 * weightKg);
                routeSteps = [
                    `Pickup from ${vendor} in ${origin.name}`,
                    "Transport: Light Courier Van to International Airport",
                    "Customs: Export Clearance",
                    `Transport: Air Cargo to major hub in ${dest.name}`,
                    "Customs: Import Clearance",
                    `Final Transport: Local Postal/Courier Network to destination`
                ];
            } else if (weightKg >= 2 && weightKg < 150) {
                transportType = "Standard Air Freight";
                estimatedCost = 150.00 + (5.50 * weightKg);
                routeSteps = [
                    `Pickup from ${vendor} in ${origin.name}`,
                    "Transport: Box Truck to Major International Airport",
                    "Customs: Commercial Export Clearance",
                    `Transport: Wide-body Commercial Air Freight to ${dest.name}`,
                    "Customs: Commercial Import Clearance",
                    "Final Transport: Local Freight Courier to destination"
                ];
            } else if (weightKg >= 150 && weightKg < 2000) {
                transportType = "Ocean Freight - LCL (Less than Container Load)";
                estimatedCost = 250.00 + (1.50 * weightKg);
                routeSteps = [
                    `Pickup from ${vendor} in ${origin.name}`,
                    "Transport: Heavy Truck to Origin Seaport Export Terminal",
                    "Hub: Container Consolidation (LCL)",
                    "Transport: Ocean Cargo Vessel",
                    `Arrival: Destination Seaport in ${dest.name}`,
                    "Hub: Customs Deconsolidation Center",
                    "Final Transport: Regional Freight Train / LTL Truck"
                ];
            } else {
                transportType = "Ocean Freight - FCL (Full Container Load)";
                estimatedCost = 1800.00; // Flat rate estimate for FCL
                routeSteps = [
                    `Pickup from ${vendor} in ${origin.name}`,
                    "Transport: Container Truck to Origin Seaport",
                    "Transport: Ocean Cargo Vessel (FCL)",
                    `Arrival: Major Port Terminal in ${dest.name}`,
                    "Customs: Automated Broker Interface Clearance",
                    "Transport: Intermodal Rail Freight",
                    "Final Transport: Semi-Truck (Drayage) to final facility"
                ];
            }
        }

        // Format Currency
        const formattedCost = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(estimatedCost);

        // Output Formatting
        let htmlOutput = `<h3>Recommended Transport: ${transportType}</h3>`;
        htmlOutput += `<div class="cost-highlight">Estimated Cost: ${formattedCost}</div>`;
        htmlOutput += `<p><strong>Product Type:</strong> <span style="text-transform: capitalize;">${product}</span></p>`;
        htmlOutput += `<p><strong>Route:</strong> ${origin.name} &rarr; ${dest.name}</p>`;
        htmlOutput += `<p><strong>Standardized Weight:</strong> ${weightKg.toFixed(2)} kg</p>`;
        htmlOutput += `<h4>Logistics Path:</h4>`;
        
        routeSteps.forEach((step, index) => {
            htmlOutput += `<div class="step"><strong>Step ${index + 1}:</strong> ${step}</div>`;
        });

        resultDiv.innerHTML = htmlOutput;
        resultDiv.style.display = 'block';
    }

    // Initialize
    window.onload = initializeApp;
</script>

</body>
</html>
